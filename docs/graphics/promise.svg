<svg class="gpro" viewBox="0 0 520 140" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="gpro-t gpro-d">
  <title id="gpro-t">Versprechen: Ich baue, Sie sehen, dann Preis</title>
  <desc id="gpro-d">Dreistufiger Ablauf mit ruhig wanderndem Signalpunkt.</desc>
  <style>
    .gpro .gpro-line{fill:none;stroke:rgba(255,255,255,.18);stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;}
    .gpro .gpro-node{fill:none;stroke:rgba(255,255,255,.18);stroke-width:1.9;}
    .gpro .gpro-ico{fill:none;stroke:#fff;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;}
    .gpro .gpro-acc{fill:none;stroke:#9fb6ff;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;}
    .gpro .gpro-lbl{fill:#a1a1aa;font-family:inherit;font-size:11px;font-weight:500;letter-spacing:.2px;}
    .gpro .gpro-num{fill:#9fb6ff;font-family:inherit;font-size:10px;font-weight:600;}
    .gpro .gpro-dot{fill:#7d9bff;opacity:0;}
    .gpro .gpro-halo{transform-box:fill-box;transform-origin:center;}

    @keyframes gproHalo{0%,100%{opacity:.10;transform:scale(1);}50%{opacity:.26;transform:scale(1.12);}}
    .gpro .gpro-halo{animation:gproHalo 4.4s ease-in-out infinite;}
    .gpro .gpro-h2{animation-delay:1.4s;}
    .gpro .gpro-h3{animation-delay:2.8s;}

    @keyframes gproReveal{0%,8%{stroke-dashoffset:18;opacity:0;}22%,100%{stroke-dashoffset:0;opacity:1;}}
    .gpro .gpro-check{stroke-dasharray:18;stroke-dashoffset:18;opacity:0;animation:gproReveal 4.4s ease-in-out infinite;}

    @keyframes gproFlow{0%{offset-distance:0%;opacity:0;}6%{opacity:1;}90%{opacity:1;}100%{offset-distance:100%;opacity:0;}}
    @supports (offset-path:path('M0,0 L1,1')){
      .gpro .gpro-dot{opacity:1;}
      .gpro .gpro-signal{offset-path:path('M84,64 L231,64 L378,64');animation:gproFlow 4.4s linear infinite;}
    }

    @media (prefers-reduced-motion:reduce){
      .gpro .gpro-halo,.gpro .gpro-check,.gpro .gpro-signal{animation:none;}
      .gpro .gpro-check{stroke-dashoffset:0;opacity:1;}
      .gpro .gpro-signal{display:none;}
      .gpro .gpro-halo{opacity:.16;}
    }
  </style>

  <!-- connecting rails: equal 14px gaps between node edge (r22) and rail ends -->
  <path class="gpro-line" d="M120,64 H195"/>
  <path class="gpro-line" d="M267,64 H342"/>

  <!-- ===== Stufe 1: Ich baue (Zahnrad) ===== -->
  <g>
    <circle class="gpro-halo gpro-h1" cx="84" cy="64" r="26" fill="#7d9bff"/>
    <circle class="gpro-node" cx="84" cy="64" r="22"/>
    <g class="gpro-ico" transform="translate(84,64)">
      <circle cx="0" cy="0" r="4"/>
      <path d="M0,-10 V-7 M0,7 V10 M-10,0 H-7 M7,0 H10 M-7.1,-7.1 l2.1,2.1 M5,5 l2.1,2.1 M7.1,-7.1 l-2.1,2.1 M-5,5 l-2.1,2.1"/>
    </g>
  </g>

  <!-- ===== Stufe 2: Sie sehen (Auge) ===== -->
  <g>
    <circle class="gpro-halo gpro-h2" cx="231" cy="64" r="26" fill="#7d9bff"/>
    <circle class="gpro-node" cx="231" cy="64" r="22"/>
    <g class="gpro-ico" transform="translate(231,64)">
      <path d="M-11,0 C-6,-7 6,-7 11,0 C6,7 -6,7 -11,0 Z"/>
      <circle cx="0" cy="0" r="3"/>
    </g>
  </g>

  <!-- ===== Stufe 3: dann Preis (Häkchen) ===== -->
  <g>
    <circle class="gpro-halo gpro-h3" cx="378" cy="64" r="26" fill="#7d9bff"/>
    <circle class="gpro-node" cx="378" cy="64" r="22"/>
    <g class="gpro-ico" transform="translate(378,64)">
      <path class="gpro-acc gpro-check" d="M-6,0 L-1.5,5 L7,-5"/>
    </g>
  </g>

  <!-- signal dot: travels through all three node centers -->
  <circle class="gpro-dot gpro-signal" r="3.4"/>

  <!-- labels -->
  <text class="gpro-num" x="84"  y="104" text-anchor="middle">01</text>
  <text class="gpro-num" x="231" y="104" text-anchor="middle">02</text>
  <text class="gpro-num" x="378" y="104" text-anchor="middle">03</text>
  <text class="gpro-lbl" x="84"  y="120" text-anchor="middle">Ich baue</text>
  <text class="gpro-lbl" x="231" y="120" text-anchor="middle">Sie sehen</text>
  <text class="gpro-lbl" x="378" y="120" text-anchor="middle">dann Preis</text>
</svg>