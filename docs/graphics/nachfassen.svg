<svg class="gnach" viewBox="0 0 220 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="gnach-t gnach-d">
  <title id="gnach-t">Automatisches Nachfassen</title>
  <desc id="gnach-d">Ein Briefumschlag sendet in ruhigem Rhythmus eine Nachricht nach rechts, danach erscheint ein blaues Erledigt-Häkchen.</desc>
  <style>
    .gnach{--blue:#2456FF;--blue-dark:#1B3FBF;--line:#e5e7eb;--ink:#111111;}
    .gnach .gnach-ico{fill:none;stroke:var(--ink);stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;}
    .gnach .gnach-card{fill:#ffffff;stroke:var(--line);stroke-width:1.9;}
    .gnach .gnach-rail{stroke:var(--line);stroke-width:1.9;stroke-dasharray:2 5;stroke-linecap:round;}
    .gnach .gnach-dot{fill:var(--blue);opacity:0;}
    .gnach .gnach-check{stroke:var(--blue);stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;fill:none;opacity:0;stroke-dasharray:14;stroke-dashoffset:14;}
    .gnach .gnach-ring{stroke:var(--blue);stroke-width:1.9;fill:none;opacity:.25;}

    @keyframes gnachPulse{0%,100%{opacity:.10;transform:scale(1);}50%{opacity:.22;transform:scale(1.05);}}
    .gnach .gnach-pulse{transform-box:fill-box;transform-origin:center;animation:gnachPulse 4.5s ease-in-out infinite;}

    @supports (offset-path:path('M0,0 L1,1')){
      @keyframes gnachFlow{0%{offset-distance:0%;opacity:0;}12%{opacity:1;}80%{opacity:1;}100%{offset-distance:100%;opacity:0;}}
      .gnach .gnach-d1{offset-path:path('M80,60 C108,60 134,60 163,60');animation:gnachFlow 4.5s ease-in-out infinite;}
      .gnach .gnach-d2{offset-path:path('M80,60 C108,60 134,60 163,60');animation:gnachFlow 4.5s ease-in-out infinite 1.4s;}
    }

    @keyframes gnachTick{0%,55%{opacity:0;stroke-dashoffset:14;}70%{opacity:1;}100%{opacity:1;stroke-dashoffset:0;}}
    .gnach .gnach-check{animation:gnachTick 4.5s ease-in-out infinite;}

    @media (prefers-reduced-motion:reduce){
      .gnach .gnach-pulse{animation:none;opacity:.18;}
      .gnach .gnach-dot{animation:none;opacity:0;}
      .gnach .gnach-check{animation:none;opacity:1;stroke-dashoffset:0;}
    }
  </style>

  <!-- connecting rail -->
  <line class="gnach-rail" x1="78" y1="60" x2="160" y2="60"/>

  <!-- left: envelope sender -->
  <circle class="gnach-ring gnach-pulse" cx="48" cy="60" r="30"/>
  <g transform="translate(33,49)">
    <rect class="gnach-card" x="0" y="0" width="30" height="22" rx="3"/>
    <path class="gnach-ico" d="M2 3 L15 13 L28 3"/>
  </g>

  <!-- moving messages -->
  <circle class="gnach-dot gnach-d1" cx="0" cy="0" r="3"/>
  <circle class="gnach-dot gnach-d2" cx="0" cy="0" r="3"/>

  <!-- right: done check -->
  <circle class="gnach-card" cx="178" cy="60" r="15"/>
  <path class="gnach-check" d="M171 60 L176 65 L186 54"/>
</svg>